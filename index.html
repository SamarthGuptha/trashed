<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit= cover">
    <title>TRASHED</title>
    <meta name="description" content="Guess the famous landmark from its unhinged 1-star reviews, six guesses. Endless mode."/>
    <link rel="stylesheet" href="./css/reset.css"/>
    <link rel="stylesheet" href="./css/theme.css"/>
    <link rel="stylesheet" href="./css/game.css"/>
</head>
<body>
<header class="app-header">
    <div class="brand">
        <span class="brand-mark">★</span>
        <span class="brand-name">TRASHED</span>
    </div>
    <div class="header-stats">
        <div class="stat" title="Current streak">
            <span class="stat-icon">🔥</span>
            <span class="stat-value" id="streak">0</span>
        </div>
        <div class="stat" title="High score">
            <span class="stat-icon">🏆</span>
            <span class="stat-value" id="highscore">0</span>
        </div>
    </div>
</header>

<main class="app-main">
    <article class="review-card" id="review-card" aria-live="polite">
        <header class="review-head">
            <div class="avatar" aria-hidden="true"></div>
            <div class="review-meta">
                <div class="review-author" id="author">-</div>
                <div class="review-sub">
                    <div class="stars" id="stars" aria-label="One star reviews">
                        <span class="star" data-i="0">★</span>
                        <span class="star" data-i="1">★</span>
                        <span class="star" data-i="2">★</span>
                        <span class="star" data-i="3">★</span>
                        <span class="star" data-i="4">★</span>
                    </div>
                    <span class="review-date" id="review-date"></span>
                </div>
            </div>
            <div class="review-source" id="source"></div>
        </header>
        <div class="review-title" id="review-title">A review of an undisclosed location</div>
        <div class="review-body" id="clues" role="log" aria-live="polite"></div>
    </article>
</main>
<footer class="interaction-zone">
<div class="guess-dots" id="guess-dots" aria-label="Guesses remaining">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>
    <form class="guess-form" id="guess-form" autocomplete="off">
        <div class="input-wrap" id="input-wrap">
            <input id="guess-input" type="text" placeholder="Guess the location..." autocomplete="off" autocapitalize="words" spellcheck="false" aria-label="Guess the location"/>
            <ul class="autocomplete" id="autocomplete" role="listbox" hidden></ul>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Guess</button>
    </form>
    <div class="hint" id="hint">Type a landmark, then press Enter.</div>
</footer>
<script type="module" src="./js/main.js"></script>
</body>
</html>
